<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>yTauron — Minecraft Builder Portfolio</title>
<meta name="description" content="Portfolio de yTauron (Julián), builder profesional de Minecraft. Estructuras, lobbies y arenas PvP con estilo propio, desde 2021.">
<meta name="author" content="Julián — yTauron">

<!-- Open Graph (previews en Discord, WhatsApp, etc.) -->
<meta property="og:type" content="website">
<meta property="og:title" content="yTauron — Minecraft Builder Portfolio">
<meta property="og:description" content="Builder profesional de Minecraft desde 2021 — estructuras, lobbies y arenas PvP con estilo propio.">
<meta property="og:image" content="https://ytauron0.github.io/ytauron-portfolio/assets/images/escena-1.jpg">
<meta property="og:url" content="https://ytauron0.github.io/ytauron-portfolio/">

<!-- Favicon -->
<link rel="icon" type="image/png" href="assets/images/favicon.png">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300..700&family=Sora:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<link rel="stylesheet" href="css/styles.css">
<link rel="stylesheet" href="css/portfolio.css">
<link rel="stylesheet" href="css/responsive.css">
</head>
<body>

<section class="hero">
  <div class="hero-bg-a"></div>
  <div class="hero-bg-b"></div>
  <div class="hero-overlay"></div>
  <canvas id="particles"></canvas>

  <div class="hero-content">
    <div class="panel">
      <div class="rama">
        <svg viewBox="0 0 220 170" fill="none">
          <path d="M210,10 C170,20 150,45 120,55 C90,65 70,80 55,95" stroke="#6b4a2a" stroke-width="3" stroke-linecap="round" opacity="0.8"/>
          <circle cx="205" cy="14" r="5" fill="#ffb057" opacity="0.9"/>
          <circle cx="180" cy="26" r="7" fill="#ffd27a" opacity="0.85"/>
          <circle cx="155" cy="20" r="4" fill="#ffb057" opacity="0.7"/>
          <circle cx="130" cy="48" r="6" fill="#ffd27a" opacity="0.8"/>
          <circle cx="95" cy="72" r="5" fill="#ffb057" opacity="0.75"/>
        </svg>
      </div>

      <div class="eyebrow"><span class="dot"></span><span data-i18n="hero.eyebrow">available for commissions</span></div>
      <h1 id="title"></h1>
      <p class="tagline" data-i18n="hero.tagline">Builder since 2021 — structures, lobbies, and PvP arenas with a signature style.</p>
      <div class="cta-row">
        <a href="#about" class="btn btn-primary" data-i18n="hero.cta_portfolio">View Portfolio</a>
        <a href="https://discord.com/users/847591632890363954" target="_blank" rel="noopener" class="btn btn-ghost" data-i18n="hero.cta_contact">Contact</a>
      </div>
    </div>
  </div>
</section>

<section class="about" id="about">
  <div class="about-grid reveal-stagger">

    <div class="panel about-text">
      <span class="eyebrow"><span class="dot"></span><span data-i18n="about.eyebrow">about</span></span>
      <h2 data-i18n="about.title">Who's behind the builds</h2>
      <p data-i18n-html="about.text"></p>
    </div>

    <div class="panel discord-card">
      <div class="discord-avatar-wrap">
        <img id="discordAvatar" class="discord-avatar" src="" alt="Discord avatar">
        <span id="discordStatusDot" class="discord-status-dot"></span>
      </div>
      <div class="discord-name" id="discordName">Loading...</div>
      <div class="discord-label" data-i18n="about.discord_label">builder on Discord</div>
      <a href="https://discord.com/users/847591632890363954" target="_blank" rel="noopener" class="btn btn-ghost btn-small" data-i18n="about.add_me">Add me</a>
    </div>

  </div>
</section>

<section class="portfolio-section" id="portfolio">
  <div class="portfolio-header reveal">
    <span class="eyebrow"><span class="dot"></span><span data-i18n="portfolio.eyebrow">portfolio</span></span>
    <h2 data-i18n="portfolio.title">Builds recientes</h2>
    <p data-i18n="portfolio.subtitle">Una selección de proyectos — filtrá por categoría.</p>
  </div>

  <div class="filter-bar reveal" id="filterBar"></div>

  <div class="bento-grid" id="bentoGrid"></div>
</section>

<div class="lightbox" id="lightbox">
  <div class="lightbox-content">
    <img id="lightboxImg" src="" alt="">
    <div class="lightbox-info">
      <h3 id="lightboxTitle"></h3>
      <div class="coords" id="lightboxCoords"></div>
      <p class="desc" id="lightboxDesc"></p>
    </div>
    <button class="lightbox-close" id="lightboxCloseBtn">✕</button>
  </div>
</div>

<div class="music-card" id="musicCard"></div>

<div class="visit-counter" id="visitCounter">
  <span class="visit-dot"></span>
  <span id="visitCount">—</span> <span data-i18n="visits">visits</span>
</div>

<button class="lang-toggle" id="langToggle">EN</button>

<script src="https://open.spotify.com/embed/iframe-api/v1" async></script>
<script src="js/i18n.js" defer></script>
<script src="js/portfolio.js" defer></script>
<script src="js/script.js" defer></script>
<script data-goatcounter="https://ytauron-portfolio.goatcounter.com/count"
        async src="//gc.zgo.at/count.js"></script>
</body>
</html>
